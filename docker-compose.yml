version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartledger-db
    environment:
      POSTGRES_USER: smartledger
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartledger_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartledger -d smartledger_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartledger-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/smartledger_db
      - SPRING_DATASOURCE_USERNAME=smartledger
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=supersecretkeythatisatleast256bitslong1234567890supersecretkeythatisatleast256bitslong1234567890
      - ALLOWED_ORIGINS=http://localhost:5173
      - MAIL_USERNAME=test@example.com
      - MAIL_PASSWORD=test
      - GEMINI_API_KEY=test
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: smartledger-ui
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  pgdata:
