services:
  - type: web
    name: smartledger-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: smartledger-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smartledger-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: smartledger-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smartledger-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smartledger-db
          property: password
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false

databases:
  - name: smartledger-db
    databaseName: smartledger
    user: smartledger
    plan: free
